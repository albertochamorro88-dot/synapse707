<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 250" width="640" height="250" role="img" aria-label="SYNAPSE707">
  <defs>
    <!-- CRT screen background -->
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#08180d"/>
      <stop offset="70%" stop-color="#040d06"/>
      <stop offset="100%" stop-color="#010401"/>
    </radialGradient>
    <!-- phosphor dot-matrix -->
    <pattern id="dots" width="7" height="7" patternUnits="userSpaceOnUse">
      <rect x="0.9" y="0.9" width="3.3" height="3.3" rx="0.6" fill="#9dff84"/>
    </pattern>
    <!-- scanlines -->
    <pattern id="scan" width="6" height="3" patternUnits="userSpaceOnUse">
      <rect width="6" height="1.2" y="1.8" fill="#000" opacity="0.45"/>
    </pattern>
    <!-- phosphor glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- vignette -->
    <radialGradient id="vig" cx="50%" cy="50%" r="62%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.6"/>
    </radialGradient>
    <!-- text masked -> dotted -->
    <mask id="phos">
      <rect width="640" height="250" fill="#000"/>
      <text x="320" y="148" text-anchor="middle" fill="#fff"
            font-family="'Courier New',monospace" font-weight="700"
            font-size="96" textLength="556" lengthAdjust="spacingAndGlyphs">SYNAPSE707</text>
      <text x="320" y="206" text-anchor="middle" fill="#fff"
            font-family="'Courier New',monospace" font-weight="700"
            font-size="24" textLength="320" lengthAdjust="spacingAndGlyphs">synapse707.netlify.app</text>
    </mask>
    <clipPath id="screen"><rect x="4" y="4" width="632" height="242" rx="18"/></clipPath>
  </defs>

  <g clip-path="url(#screen)">
    <!-- panel -->
    <rect x="4" y="4" width="632" height="242" rx="18" fill="url(#bg)"/>
    <!-- CRT curve highlight -->
    <ellipse cx="320" cy="14" rx="360" ry="42" fill="#9dff84" opacity="0.05"/>

    <!-- top-right tag -->
    <g font-family="'Courier New',monospace" fill="#86ff6a" opacity="0.8" letter-spacing="1">
      <text x="612" y="38" text-anchor="end" font-size="16" font-weight="700">DYSTOPIAN</text>
      <text x="612" y="56" text-anchor="end" font-size="16" font-weight="700">AI IMAGEBOARD</text>
    </g>
    <!-- top-left ticks -->
    <text x="28" y="38" font-family="'Courier New',monospace" font-size="13" fill="#4f8f53" opacity="0.8">07 / SIGNAL</text>

    <!-- dotted wordmark + url -->
    <g filter="url(#glow)">
      <rect width="640" height="250" fill="url(#dots)" mask="url(#phos)"/>
    </g>

    <!-- overlays -->
    <rect x="4" y="4" width="632" height="242" fill="url(#scan)"/>
    <rect x="4" y="4" width="632" height="242" fill="url(#vig)"/>
    <rect x="4" y="4" width="632" height="242" rx="18" fill="none" stroke="#3aff5b" stroke-opacity="0.35" stroke-width="2"/>
  </g>
</svg>
