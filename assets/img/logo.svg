<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 250" width="640" height="250" role="img" aria-label="SYNAPSE707">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#08180d"/>
      <stop offset="70%" stop-color="#040d06"/>
      <stop offset="100%" stop-color="#010401"/>
    </radialGradient>
    <!-- denser phosphor dot-matrix so chunky letters read solid -->
    <pattern id="dots" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.9" fill="#a9ff8c"/>
    </pattern>
    <pattern id="scan" width="6" height="3" patternUnits="userSpaceOnUse">
      <rect width="6" height="1.2" y="1.8" fill="#000" opacity="0.45"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="vig" cx="50%" cy="50%" r="62%">
      <stop offset="52%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.62"/>
    </radialGradient>
    <!-- chunky stylized wordmark: heavy condensed, italic skew, stretched -->
    <mask id="phos">
      <rect width="640" height="250" fill="#000"/>
      <g transform="translate(320 128) skewX(-7)">
        <text x="0" y="0" text-anchor="middle"
              fill="#fff" stroke="#fff" stroke-width="5" stroke-linejoin="round" paint-order="stroke"
              font-family="'Arial Black','Helvetica Neue',Impact,sans-serif" font-weight="900"
              font-size="120" textLength="560" lengthAdjust="spacingAndGlyphs"
              transform="scale(1,1.22)">SYNAPSE707</text>
      </g>
      <text x="320" y="212" text-anchor="middle" fill="#fff"
            font-family="'Courier New',monospace" font-weight="700"
            font-size="22" textLength="300" lengthAdjust="spacingAndGlyphs">dystopian ai imageboard</text>
    </mask>
    <clipPath id="screen"><rect x="4" y="4" width="632" height="242" rx="18"/></clipPath>
  </defs>

  <g clip-path="url(#screen)">
    <rect x="4" y="4" width="632" height="242" rx="18" fill="url(#bg)"/>
    <ellipse cx="320" cy="14" rx="360" ry="42" fill="#a9ff8c" opacity="0.05"/>

    <g font-family="'Courier New',monospace" fill="#86ff6a" opacity="0.85" letter-spacing="1">
      <text x="612" y="36" text-anchor="end" font-size="15" font-weight="700">SYNAPSE</text>
      <text x="612" y="53" text-anchor="end" font-size="15" font-weight="700">707</text>
    </g>
    <text x="28" y="36" font-family="'Courier New',monospace" font-size="13" fill="#4f8f53" opacity="0.85">07 / SIGNAL</text>

    <g filter="url(#glow)">
      <rect width="640" height="250" fill="url(#dots)" mask="url(#phos)"/>
    </g>

    <rect x="4" y="4" width="632" height="242" fill="url(#scan)"/>
    <rect x="4" y="4" width="632" height="242" fill="url(#vig)"/>
    <rect x="4" y="4" width="632" height="242" rx="18" fill="none" stroke="#3aff5b" stroke-opacity="0.35" stroke-width="2"/>
  </g>
</svg>
